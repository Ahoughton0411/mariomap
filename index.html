<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>🍄 MarioMap</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#05070e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MarioMap"/>
  <link rel="apple-touch-icon" href="/icon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#05070e;font-family:'Press Start 2P',monospace;touch-action:none}
    #galaxy{position:absolute;inset:0;transition:opacity .38s ease,transform .38s ease;z-index:1}
    #galaxy.hidden{opacity:0;pointer-events:none;transform:scale(1.06)}
    #stars{position:absolute;inset:0;width:100%;height:100%}
    #pipes{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
    #worlds{position:absolute;inset:0}
    .world{position:absolute;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;-webkit-tap-highlight-color:transparent}
    .orb{border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .18s ease,box-shadow .18s ease;position:relative}
    .world:active .orb{transform:scale(.9)}
    .orb-inner{font-size:clamp(18px,5vw,32px);line-height:1;z-index:2;position:relative}
    .wlabel{font-size:clamp(5px,1.3vw,7px);color:#c8dce8;text-align:center;line-height:1.7;text-shadow:0 1px 6px #000}
    .wgame{font-size:clamp(4px,1vw,5px);letter-spacing:.18em;color:#3a5a48;margin-top:2px}
    .world.dim .orb{opacity:.38;filter:grayscale(.6)}
    .world.dim .wlabel{opacity:.3}
    #ghead{position:absolute;top:0;left:0;right:0;padding:max(14px,env(safe-area-inset-top)) 0 14px;text-align:center;pointer-events:none;z-index:10}
    #gtitle{font-size:clamp(10px,3.2vw,15px);color:#fff;text-shadow:0 0 18px #4ade80,0 0 36px #22c55e;letter-spacing:.18em}
    #gsub{margin-top:7px;font-size:clamp(5px,1.4vw,7px);color:#2a4a36;letter-spacing:.24em}
    #panel{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .34s cubic-bezier(.25,.46,.45,.94)}
    #panel.open{transform:translateY(0)}
    #pbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:max(10px,env(safe-area-inset-top)) 14px 10px;background:#05070e;border-bottom:2px solid #1a2a1a}
    #backbtn{font-family:'Press Start 2P',monospace;font-size:7px;background:none;border:1px solid #2a4a2a;color:#4ade80;padding:8px 11px;border-radius:4px;cursor:pointer;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
    #backbtn:active{background:#0a180a}
    #pname{font-size:clamp(6px,2vw,9px);color:#e2e8f0;letter-spacing:.1em;flex:1;min-width:0}
    #ptag{font-size:5px;color:#253a2a;letter-spacing:.18em;flex-shrink:0}
    #pcontent{flex:1;position:relative;overflow:hidden;background:#05070e}
    #tframe{width:100%;height:100%;border:none;background:#05070e;display:none}
    #launchscreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 28px}
    #launchscreen.on{display:flex}
    #lemoji{font-size:58px}
    #lname{font-size:clamp(8px,2.6vw,12px);color:#e2e8f0;text-align:center;line-height:1.9}
    #lsub{font-size:clamp(5px,1.4vw,7px);color:#3a5a48;letter-spacing:.22em}
    #launbtn{font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,10px);background:#102010;border:2px solid #4ade80;color:#4ade80;padding:16px 26px;border-radius:6px;cursor:pointer;letter-spacing:.1em;box-shadow:0 0 22px rgba(74,222,128,.18);transition:background .15s,box-shadow .15s}
    #launbtn:active{background:#1a3a1a;box-shadow:0 0 32px rgba(74,222,128,.38)}
    #lnote{font-size:5px;color:#1e2e1e;text-align:center;line-height:2;max-width:240px}
    #comingscreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 28px}
    #comingscreen.on{display:flex}
    #cemoji{font-size:54px;filter:grayscale(1);opacity:.35}
    .ctxt{font-size:clamp(7px,2vw,10px);color:#253a2a;text-align:center;line-height:2.2}
    .csub{font-size:5px;color:#162216;letter-spacing:.22em}
  </style>
</head>
<body>
<div id="galaxy">
  <canvas id="stars"></canvas>
  <svg id="pipes" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="worlds"></div>
  <div id="ghead">
    <div id="gtitle">🍄 MARIOMAP</div>
    <div id="gsub">SELECT A WORLD</div>
  </div>
</div>
<div id="panel">
  <div id="pbar">
    <button id="backbtn" onclick="closePanel()">← MAP</button>
    <span id="pname"></span>
    <span id="ptag"></span>
  </div>
  <div id="pcontent">
    <iframe id="tframe" title="Tool" allow="clipboard-write; fullscreen"></iframe>
    <div id="launchscreen">
      <div id="lemoji"></div>
      <div id="lname"></div>
      <div id="lsub"></div>
      <button id="launbtn" onclick="launchExt()">▶ OPEN TOOL</button>
      <div id="lnote">OPENS IN YOUR BROWSER</div>
    </div>
    <div id="comingscreen">
      <div id="cemoji"></div>
      <div class="ctxt">WORLD UNDER<br/>CONSTRUCTION</div>
      <div class="csub">COMING SOON</div>
    </div>
  </div>
</div>
<script>
const WORLDS=[
  {id:'everythingmap',name:'EVERYTHING\nMAP',sub:'CONNECTIONS',game:'GALAXY',color:'#7c3aed',glow:'#a78bfa',emoji:'🌌',src:'/everythingmap.html',mode:'iframe',x:52,y:44,r:56},
  {id:'questboard',name:'QUEST\nBOARD',sub:'MISSIONS',game:'SMB2',color:'#0f766e',glow:'#5eead4',emoji:'⚔️',src:'https://questboard-app.netlify.app',mode:'launch',x:22,y:67,r:42},
  {id:'salonhub',name:'SALON\nHUB',sub:'JESS · IMPRESSIONS',game:'SMW',color:'#9d174d',glow:'#f9a8d4',emoji:'💇',src:'https://jessicasalonhub.netlify.app',mode:'launch',x:78,y:67,r:38},
  {id:'heroes',name:'HEROES\nPLUMBING',sub:'CRAFT ENGINE',game:'SMB1',color:'#1e40af',glow:'#93c5fd',emoji:'🔧',src:'https://heroesplumbing.netlify.app',mode:'launch',x:28,y:24,r:34},
  {id:'rddetailing',name:"R&D\nDETAILING",sub:'CRAFT ENGINE',game:"YOSHI'S",color:'#065f46',glow:'#6ee7b7',emoji:'🚗',src:null,mode:'coming',x:74,y:24,r:34},
  {id:'creation',name:'CREATION\nENGINE',sub:'PERSONAL',game:'ODYSSEY',color:'#92400e',glow:'#fbbf24',emoji:'✨',src:null,mode:'coming',x:10,y:46,r:30}
];
const PIPES=[['everythingmap','questboard'],['everythingmap','salonhub'],['everythingmap','heroes'],['everythingmap','rddetailing'],['everythingmap','creation']];
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');let stars=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
function initStars(){stars=[];for(let i=0;i<230;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.3+.2,o:Math.random()*.55+.1,speed:Math.random()*.006+.002,phase:Math.random()*Math.PI*2})}
function drawStars(ts){ctx.clearRect(0,0,canvas.width,canvas.height);const t=ts/1000;stars.forEach(s=>{const o=s.o*(.55+.45*Math.sin(t*s.speed*100+s.phase));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${o})`;ctx.fill()});requestAnimationFrame(drawStars)}
resizeCanvas();initStars();requestAnimationFrame(drawStars);
window.addEventListener('resize',()=>{resizeCanvas();initStars();renderAll()});
function renderAll(){renderPipes();renderWorlds()}
function renderPipes(){const svg=document.getElementById('pipes');svg.innerHTML='';PIPES.forEach(([aId,bId])=>{const a=WORLDS.find(w=>w.id===aId),b=WORLDS.find(w=>w.id===bId);if(!a||!b)return;const ax=a.x/100*window.innerWidth,ay=a.y/100*window.innerHeight,bx=b.x/100*window.innerWidth,by=b.y/100*window.innerHeight;const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',ax);line.setAttribute('y1',ay);line.setAttribute('x2',bx);line.setAttribute('y2',by);line.setAttribute('stroke','#1e4a28');line.setAttribute('stroke-width','2');line.setAttribute('stroke-dasharray','5 9');line.setAttribute('opacity','.45');svg.appendChild(line)})}
function renderWorlds(){const c=document.getElementById('worlds');c.innerHTML='';WORLDS.forEach(w=>{const size=Math.max(48,Math.min(w.r*2,window.innerWidth*.22,window.innerHeight*.18));const glow=w.mode==='coming'?'none':`0 0 ${size*.35}px ${w.glow}55, 0 0 ${size*.7}px ${w.color}33`;const el=document.createElement('div');el.className='world'+(w.mode==='coming'?' dim':'');el.style.cssText=`left:${w.x}%;top:${w.y}%`;el.onclick=()=>openPanel(w);el.innerHTML=`<div class="orb" style="width:${size}px;height:${size}px;background:radial-gradient(circle at 36% 32%, ${w.color}cc 0%, ${w.color}55 50%, ${w.color}18 100%);border:1.5px solid ${w.color}99;box-shadow:${glow};"><span class="orb-inner">${w.emoji}</span></div><div class="wlabel">${w.name.replace('\n','<br/>')}<div class="wgame">${w.game}</div></div>`;c.appendChild(el)})}
renderAll();
let currentExtSrc=null;
function openPanel(w){document.getElementById('pname').textContent=w.name.replace('\n',' ');document.getElementById('ptag').textContent=w.game;document.getElementById('pbar').style.borderBottomColor=w.color+'99';const frame=document.getElementById('tframe'),launch=document.getElementById('launchscreen'),coming=document.getElementById('comingscreen');frame.style.display='none';launch.className='';coming.className='';currentExtSrc=null;if(w.mode==='iframe'){frame.style.display='block';frame.src=w.src}else if(w.mode==='launch'){currentExtSrc=w.src;document.getElementById('lemoji').textContent=w.emoji;document.getElementById('lname').textContent=w.name.replace('\n',' ');document.getElementById('lsub').textContent=w.sub;launch.className='on'}else{document.getElementById('cemoji').textContent=w.emoji;coming.className='on'}document.getElementById('galaxy').classList.add('hidden');document.getElementById('panel').classList.add('open');history.pushState({panel:true},'')}
function closePanel(){document.getElementById('panel').classList.remove('open');document.getElementById('galaxy').classList.remove('hidden');setTimeout(()=>{document.getElementById('tframe').src=''},380)}
function launchExt(){if(currentExtSrc)window.open(currentExtSrc,'_blank')}
window.addEventListener('popstate',()=>{if(document.getElementById('panel').classList.contains('open'))closePanel()});
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
</body>
</html>
